<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#166534">
  <title>Ahır Takip</title>

  <style>
    :root{
      --green:#166534;--green2:#0f4a2c;--bg:#f4f7f5;--card:#fff;--line:#e5e7eb;
      --text:#111827;--muted:#6b7280;--red:#dc2626;--blue:#2563eb;
      --orange:#ea580c;--purple:#7e22ce;--yellow:#b77900;
      --shadow:0 10px 26px rgba(15,23,42,.08);
      --bottom:env(safe-area-inset-bottom,0px);
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;min-height:100%;background:var(--bg);color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      -webkit-text-size-adjust:100%;touch-action:manipulation;
    }
    button,input,select,textarea{font:inherit}
    button{cursor:pointer;-webkit-tap-highlight-color:transparent}
    .app{max-width:560px;min-height:100dvh;margin:0 auto;background:var(--bg);padding-bottom:calc(86px + var(--bottom))}
    .top{
      position:sticky;top:0;z-index:20;color:#fff;padding:16px 16px 20px;
      padding-top:calc(16px + env(safe-area-inset-top,0px));
      background:linear-gradient(135deg,#1f7a3c,#0f4a2c);
      border-radius:0 0 26px 26px;box-shadow:0 10px 24px rgba(22,101,52,.24);overflow:hidden;
    }
    .top:after{
      content:"";position:absolute;right:0;bottom:0;width:260px;height:90px;opacity:.13;background:#fff;
      clip-path:polygon(0 72%,18% 45%,32% 63%,50% 34%,66% 58%,82% 28%,100% 50%,100% 100%,0 100%);
    }
    .toprow{position:relative;z-index:1;display:grid;grid-template-columns:44px 1fr 44px;align-items:center;gap:8px}
    .iconbtn{width:44px;height:44px;border:0;border-radius:15px;background:rgba(255,255,255,.13);color:#fff;font-size:22px;font-weight:900}
    h1{margin:0;text-align:center;font-size:32px;line-height:1.05;font-weight:950;letter-spacing:-.8px}
    .subtop{text-align:center;font-size:14px;opacity:.92;margin-top:6px}
    .dotlive{display:inline-block;width:10px;height:10px;border-radius:50%;background:#22c55e;border:2px solid rgba(255,255,255,.8);margin-right:6px;vertical-align:-1px}
    .wrap{padding:14px}
    .card{background:#fff;border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow)}
    .big{padding:16px;margin-bottom:12px}
    .summary{display:flex;align-items:center;gap:13px;margin-bottom:12px}
    .circle{width:58px;height:58px;border-radius:22px;display:grid;place-items:center;font-size:30px}
    .greenbg{background:#dcfce7;color:#15803d}.redbg{background:#fee2e2;color:#dc2626}
    .bluebg{background:#dbeafe;color:#2563eb}.orangebg{background:#ffedd5;color:#ea580c}
    .purplebg{background:#f3e8ff;color:#7e22ce}.yellowbg{background:#fef3c7;color:#b77900}
    .big b{font-size:45px;line-height:1;color:#166534}
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
    .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .tile{padding:10px 6px;border-radius:15px;text-align:center;border:1px solid var(--line);font-weight:850;font-size:13px}
    .tile strong{display:block;font-size:26px;margin-top:2px}
    .section{margin:12px 0;overflow:hidden}
    .section h2{display:flex;align-items:center;gap:9px;margin:0;padding:13px 14px;font-size:19px;border-bottom:1px solid var(--line)}
    .row{display:flex;align-items:center;gap:12px;padding:13px 14px;min-height:70px;border-bottom:1px solid var(--line);background:#fff}
    .row:last-child{border-bottom:0}
    .row:active{background:#f8fafc;transform:scale(.995)}
    .no{min-width:52px;text-align:center;font-size:28px;font-weight:950;color:#166534}
    .grow{flex:1;min-width:0}
    .main{font-weight:900;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .small{font-size:13px;color:var(--muted);margin-top:3px;line-height:1.35}
    .chev{font-size:28px;color:#9ca3af}
    .empty{padding:16px;color:var(--muted);font-weight:850}
    .pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:6px 10px;font-size:13px;font-weight:950}
    .p-normal{background:#dcfce7;color:#15803d}.p-antibiyotik{background:#fee2e2;color:#dc2626}
    .p-tohumlandi{background:#dbeafe;color:#2563eb}.p-gebe{background:#f3e8ff;color:#7e22ce}
    .p-kuru{background:#fef3c7;color:#b77900}.p-dogum{background:#ffedd5;color:#ea580c}
    .p-yeni{background:#dcfce7;color:#16a34a}.p-risk{background:#fee2e2;color:#dc2626}
    .red{color:var(--red)}.blue{color:var(--blue)}.orange{color:var(--orange)}
    .green{color:#15803d}.purple{color:var(--purple)}.yellow{color:var(--yellow)}
    .nav{
      position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:560px;
      display:grid;grid-template-columns:repeat(5,1fr);gap:4px;background:#fff;border-top:1px solid var(--line);
      padding:6px 6px calc(6px + var(--bottom));z-index:50;box-shadow:0 -10px 24px rgba(15,23,42,.08);
    }
    .nav button{border:0;background:#fff;border-radius:15px;min-height:58px;color:#52525b;font-size:11px;font-weight:850}
    .nav span{display:block;font-size:22px;line-height:24px}.nav .on{background:#dcfce7;color:#166534}
    .search{width:100%;padding:14px 16px;border:1px solid var(--line);border-radius:18px;background:#fff;font-size:16px;margin-bottom:10px}
    .tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}
    .tab{flex:0 0 auto;border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 14px;font-weight:900}
    .tab.on{background:#166534;color:#fff;border-color:#166534}
    .btn{border:0;border-radius:17px;background:#166534;color:#fff;font-weight:950;padding:13px 16px;min-height:50px}
    .btn.full{width:100%;margin:8px 0}.btn.red{background:#dc2626}.btn.blue{background:#2563eb}
    .btn.orange{background:#ea580c}.btn.purple{background:#7e22ce}.btn.gray{background:#6b7280}
    .btn.white{background:#fff;color:#111827;border:1px solid var(--line)}
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:12px 0}
    .infohead{padding:16px;display:flex;gap:14px;align-items:center}
    .avatar{width:82px;height:82px;border-radius:28px;background:#dcfce7;display:grid;place-items:center;font-size:42px;flex:0 0 auto}
    .heroNo{font-size:58px;line-height:.95;color:#166534;font-weight:950}
    .kvgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:12px}
    .kv{border:1px solid var(--line);border-radius:15px;padding:11px;text-align:center}
    .kv label{display:block;color:var(--muted);font-size:12px;font-weight:850}
    .kv b{display:block;margin-top:5px;font-size:20px;color:#166534}
    .formrow{margin:10px 0}.formrow label{display:block;font-size:13px;color:var(--muted);font-weight:900;margin:0 0 5px}
    input,select,textarea{width:100%;border:1px solid var(--line);border-radius:14px;background:#fff;padding:12px;font-size:16px;outline:none}
    textarea{min-height:78px;resize:vertical}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.42);display:none;align-items:flex-end;z-index:100}
    .modal.show{display:flex}
    .sheet{width:100%;max-width:560px;margin:0 auto;background:var(--bg);border-radius:24px 24px 0 0;padding:14px 14px calc(18px + var(--bottom));max-height:88dvh;overflow:auto}
    .sheet h2{margin:0 0 10px;font-size:24px}.sheethead{display:flex;align-items:center;justify-content:space-between}
    .x{border:0;background:#fff;border-radius:14px;width:42px;height:42px;font-size:25px}
    .date-choice{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
    .date-choice button{border:1px solid var(--line);background:#fff;border-radius:14px;padding:10px;font-weight:900}
    .date-choice .on{background:#dcfce7;border-color:#166534;color:#166534}
    .notice{background:#fffbeb;border:1px solid #fde68a;color:#92400e;border-radius:16px;padding:12px;font-weight:850;margin:10px 0}
    .danger{background:#fff1f2;border:1px solid #fecdd3;color:#991b1b;border-radius:16px;padding:12px;font-weight:850;margin:10px 0}
  </style>
</head>

<body>
  <div id="app" class="app"></div>
  <div id="modal" class="modal"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getFirestore, collection, doc, setDoc, deleteDoc, getDoc, getDocs,
      onSnapshot, serverTimestamp, writeBatch, enableIndexedDbPersistence
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAw0PJKF4nouKFttZMxd_G1a7wWuVso-C0",
      authDomain: "ahirtakip-7ec86.firebaseapp.com",
      projectId: "ahirtakip-7ec86",
      storageBucket: "ahirtakip-7ec86.firebasestorage.app",
      messagingSenderId: "1085591000233",
      appId: "1:1085591000233:web:b4f8583fcc4a9b5507c5b8"
    };

    const FARM = "ana-ciftlik";
    const GESTATION = 280;
    const DRY_BEFORE = 60;
    const BIRTH_WARN = 15;
    const TARGET_FIRST_CALVING_MONTHS = 24;

    const state = {
      db:null, ready:false, live:false, online:navigator.onLine, view:"home",
      cows:[], heifers:[], calves:[], young:[], settings:{},
      filter:"all", search:"", selected:null, modal:null, tabDays:30
    };

    const A = document.getElementById("app");
    const M = document.getElementById("modal");

    window.addEventListener("online", () => { state.online = true; render(); });
    window.addEventListener("offline", () => { state.online = false; render(); });

    const statuses = {
      normal:["Normal","p-normal","green","🐄"],
      antibiyotik:["Antibiyotikli","p-antibiyotik","red","💉"],
      tohumlandi:["Tohumlandı","p-tohumlandi","blue","💉"],
      gebe:["Gebe Kesinleşti","p-gebe","purple","✅"],
      kuru:["Kuru","p-kuru","yellow","🌾"],
      dogum:["Doğum Yaklaşan","p-dogum","orange","🐮"],
      yeni:["Yeni Doğum","p-yeni","green","🟢"],
      risk:["Riskli","p-risk","red","⚠️"]
    };

    function today(){ return new Date().toISOString().slice(0,10); }

    function addDays(d,n){
      let x = new Date((d || today()) + "T12:00:00");
      x.setDate(x.getDate() + Number(n || 0));
      return x.toISOString().slice(0,10);
    }

    function addMonths(d,n){
      let x = new Date((d || today()) + "T12:00:00");
      x.setMonth(x.getMonth() + Number(n || 0));
      return x.toISOString().slice(0,10);
    }

    function diff(a,b){
      if(!a || !b) return null;
      return Math.ceil((new Date(b+"T00:00:00") - new Date(a+"T00:00:00")) / 86400000);
    }

    function left(d){
      let n = diff(today(),d);
      if(n === null) return "-";
      if(n < 0) return Math.abs(n) + " gün geçti";
      if(n === 0) return "bugün";
      return n + " gün kaldı";
    }

    function fmt(d){
      if(!d) return "-";
      let p = d.split("-");
      return p[2] + "." + p[1] + "." + p[0];
    }

    function esc(s){
      return String(s ?? "").replace(/[&<>"']/g, m => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
      }[m]));
    }

    function uid(){ return "id_" + Math.random().toString(36).slice(2) + Date.now().toString(36); }

    function ageText(birth){
      let days = diff(birth,today());
      if(days === null || days < 0) return "-";
      if(days < 30) return days + " günlük";
      if(days < 365){
        let m = Math.floor(days / 30);
        let d = days % 30;
        return d ? m + " ay " + d + " gün" : m + " aylık";
      }
      let y = Math.floor(days / 365);
      let m = Math.floor((days % 365) / 30);
      return m ? y + " yaş " + m + " ay" : y + " yaş";
    }

    function calfPeriod(birth){
      let d = diff(birth,today());
      if(d === null) return "-";
      if(d <= 7) return "0-7 Gün";
      if(d <= 30) return "8-30 Gün";
      if(d <= 90) return "31-90 Gün";
      return "3 Ayı Geçti";
    }

    function isDue(d,days=7){
      let n = diff(today(),d);
      return n !== null && n <= days;
    }

    function path(col){ return collection(state.db,"farms",FARM,col); }
    function ref(col,key){ return doc(state.db,"farms",FARM,col,String(key)); }

    function defaultCow(no){
      return {
        no:String(no),status:"normal",birthDate:"",lactationCount:"",breed:"",milk:"",note:"",
        archived:false,treatmentName:"",treatmentDate:"",withdrawalDays:"",milkSafeDate:"",
        breeding:[],activeBreedingId:"",dueDate:"",dryOffDate:"",dryStart:"",lastBirth:"",
        milkFeverHistory:false,createdAt:serverTimestamp(),updatedAt:serverTimestamp()
      };
    }

    function defaultHeifer(no){
      return {
        no:String(no),status:"normal",birthDate:"",breed:"",note:"",archived:false,
        breeding:[],activeBreedingId:"",dueDate:"",prepDate:"",
        createdAt:serverTimestamp(),updatedAt:serverTimestamp()
      };
    }

    function defaultCalf(no){
      return {
        no:String(no),birthDate:today(),motherNo:"",sex:"dişi",breed:"",health:"iyi",note:"",
        colostrum:false,navel:false,suckle:false,records:[],archived:false,
        createdAt:serverTimestamp(),updatedAt:serverTimestamp()
      };
    }

    function defaultYoung(no){
      return {
        no:String(no),birthDate:today(),note:"",archived:false,
        createdAt:serverTimestamp(),updatedAt:serverTimestamp()
      };
    }

    async function init(){
      try{
        const app = initializeApp(firebaseConfig);
        state.db = getFirestore(app);

        try{ await enableIndexedDbPersistence(state.db); }catch(e){}

        await signInAnonymously(getAuth(app));
        state.live = true;

        await ensureBase();
        subAll();
      }catch(e){
        console.error(e);
        A.innerHTML = '<div class="wrap"><div class="danger">Firebase bağlantı hatası. Anonymous Auth ve Firestore Rules ayarını kontrol et.</div></div>';
      }
    }

    async function ensureBase(){
      const sref = ref("settings","main");
      const snap = await getDoc(sref);

      if(!snap.exists()){
        await setDoc(sref,{createdAt:serverTimestamp(),updatedAt:serverTimestamp()});
      }

      const cs = await getDocs(path("cows"));
      if(cs.empty){
        const batch = writeBatch(state.db);
        for(let i=1;i<=40;i++){
          batch.set(ref("cows",i), defaultCow(i));
        }
        await batch.commit();
      }
    }

    function subAll(){
      onSnapshot(path("cows"), s => {
        state.cows = s.docs.map(d => ({id:d.id,...d.data()})).sort(sortNo);
        render();
        autoTransitions();
      });

      onSnapshot(path("heifers"), s => {
        state.heifers = s.docs.map(d => ({id:d.id,...d.data()})).sort(sortNo);
        render();
      });

      onSnapshot(path("calves"), s => {
        state.calves = s.docs.map(d => ({id:d.id,...d.data()})).sort(sortNo);
        render();
      });

      onSnapshot(path("youngCattle"), s => {
        state.young = s.docs.map(d => ({id:d.id,...d.data()})).sort(sortNo);
        render();
      });

      onSnapshot(ref("settings","main"), s => {
        state.settings = s.exists() ? s.data() : {};
        state.ready = true;
        render();
      });
    }

    function sortNo(a,b){ return String(a.no).localeCompare(String(b.no),undefined,{numeric:true}); }

    async function save(col,key,data){
      await setDoc(ref(col,key),{...data,updatedAt:serverTimestamp()},{merge:true});
      closeModal();
    }

    async function archive(col,item){
      if(!item) return;
      if(confirm("Arşive alınsın mı?")){
        await save(col,item.id,{archived:true,archivedAt:today()});
        state.selected = null;
        render();
      }
    }

    async function remove(col,item){
      if(!item) return;
      if(confirm("Kalıcı silinsin mi? Bu işlem geri alınamaz.")){
        await deleteDoc(ref(col,item.id));
        state.selected = null;
        render();
      }
    }

    async function autoTransitions(){
      for(const c of state.cows.filter(x => !x.archived)){
        if(c.status === "gebe" && c.dryOffDate && diff(c.dryOffDate,today()) >= 0){
          await save("cows",c.id,{status:"kuru",dryStart:c.dryOffDate});
        }
        if(c.status === "kuru" && c.dueDate){
          let n = diff(today(),c.dueDate);
          if(n !== null && n >= 0 && n <= BIRTH_WARN){
            await save("cows",c.id,{status:"dogum"});
          }
        }
      }
    }

    function activeBreeding(x){
      let h = x?.breeding || [];
      if(!h.length) return null;
      return h.find(b => b.id === x.activeBreedingId) || h[h.length-1];
    }

    function breedingStats(x){
      let h = x.breeding || [];
      let tuttu = h.filter(b => b.result === "tuttu").length;
      let tutmadi = h.filter(b => b.result === "tutmadi").length;
      let risk = "Normal";
      if(h.length >= 4 && tutmadi >= 3) risk = "Yüksek";
      else if(h.length >= 3 && tutmadi >= 2) risk = "Orta";
      else if(h.length >= 2 && tutmadi >= 1) risk = "Takip";
      return {total:h.length,tuttu,tutmadi,risk};
    }

    function hasFertilityRisk(c){
      let r = breedingStats(c).risk;
      return r === "Orta" || r === "Yüksek";
    }

    function hasMilkFeverRisk(c){
      let ageYears = Math.floor((diff(c.birthDate,today()) || 0) / 365);
      return ["kuru","dogum"].includes(c.status) &&
        (ageYears >= 6 || Number(c.lactationCount || 0) >= 4 || c.milkFeverHistory);
    }

    function testDue(list,days=7){
      return list.filter(x => {
        let b = activeBreeding(x);
        if(!b) return false;
        return (b.test35Result === "bekliyor" && isDue(b.test35Date,days)) ||
               (b.test60Result === "bekliyor" && isDue(b.test60Date,days));
      });
    }

    function cowLine(c){
      let b = activeBreeding(c);
      if(c.status === "antibiyotik") return "Süt tanka girmez · " + left(c.milkSafeDate);
      if(c.status === "tohumlandi" && b) return "35: " + fmt(b.test35Date) + " · 60: " + fmt(b.test60Date);
      if(c.status === "gebe") return "Kuruya " + left(c.dryOffDate) + " · Doğuma " + left(c.dueDate);
      if(c.status === "kuru" || c.status === "dogum") return "Doğuma " + left(c.dueDate);
      if(c.status === "yeni") return "Yeni doğum · " + ageText(c.lastBirth);
      return c.milk ? c.milk + " L süt" : "Sağlıklı";
    }

    function heiferLine(h){
      let b = activeBreeding(h);
      if(b) return "35: " + left(b.test35Date) + " · 60: " + left(b.test60Date);
      if(h.birthDate){
        let target = addMonths(h.birthDate,TARGET_FIRST_CALVING_MONTHS);
        let breedDate = addDays(target,-GESTATION);
        return "Tahmini tohumlama: " + left(breedDate);
      }
      return "Doğum tarihi girilmemiş";
    }

    function top(title,sub){
      return `
        <div class="top">
          <div class="toprow">
            <button class="iconbtn" onclick="go('home')">⌂</button>
            <div>
              <h1>${title}</h1>
              <div class="subtop"><span class="dotlive"></span>${sub || (state.online ? "Online" : "İnternet yok")}</div>
            </div>
            <button class="iconbtn" onclick="go('calendar')">🔔</button>
          </div>
        </div>
      `;
    }

    function nav(){
      const items = [
        ["home","Ana Sayfa","🏠"],
        ["cows","İnekler","🐄"],
        ["heifers","Düveler","🐂"],
        ["milking","Sağım","🥛"],
        ["calendar","Takvim","📅"]
      ];

      return `
        <div class="nav">
          ${items.map(x => `
            <button class="${state.view === x[0] ? "on" : ""}" onclick="go('${x[0]}')">
              <span>${x[2]}</span>${x[1]}
            </button>
          `).join("")}
        </div>
      `;
    }

    function statusPill(s){
      let z = statuses[s] || statuses.normal;
      return `<span class="pill ${z[1]}">${z[3]} ${z[0]}</span>`;
    }

    function listRow(item,line,col){
      return `
        <div class="row" onclick="openItem('${col}','${item.id}')">
          <div class="no">${esc(item.no)}</div>
          <div class="grow">
            <div class="main">${statusPill(item.status || "normal")}</div>
            <div class="small">${esc(line)}</div>
          </div>
          <div class="chev">›</div>
        </div>
      `;
    }

    function simpleRow(no,title,sub,color="green",onclick=""){
      return `
        <div class="row" ${onclick ? `onclick="${onclick}"` : ""}>
          <div class="no ${color}">${esc(no)}</div>
          <div class="grow">
            <div class="main">${title}</div>
            <div class="small">${sub}</div>
          </div>
          <div class="chev">›</div>
        </div>
      `;
    }

    function section(title,color,rows,empty="Boş"){
      return `
        <div class="card section">
          <h2 class="${color}">${title}</h2>
          ${rows.length ? rows.join("") : `<div class="empty">${empty}</div>`}
        </div>
      `;
    }

    function home(){
      const cows = state.cows.filter(x => !x.archived);
      const heifers = state.heifers.filter(x => !x.archived);
      const calves = state.calves.filter(x => !x.archived);

    function events(days=30){
      let e = [];

      for(const c of state.cows.filter(x => !x.archived)){
        if(c.status === "antibiyotik" && c.milkSafeDate){
          e.push([c.milkSafeDate,c.no,"Antibiyotik kontrol","red","cows",c.id]);
        }

        let b = activeBreeding(c);
        if(b){
          if(b.test35Result === "bekliyor") e.push([b.test35Date,c.no,"35. gün gebelik testi","blue","cows",c.id]);
          if(b.test60Result === "bekliyor") e.push([b.test60Date,c.no,"60. gün gebelik testi","blue","cows",c.id]);
        }

        if(c.dueDate) e.push([c.dueDate,c.no,"Tahmini doğum","orange","cows",c.id]);
        if(c.dryOffDate) e.push([c.dryOffDate,c.no,"Kuruya alma","yellow","cows",c.id]);
      }

      for(const h of state.heifers.filter(x => !x.archived)){
        let b = activeBreeding(h);
        if(b){
          if(b.test35Result === "bekliyor") e.push([b.test35Date,h.no,"35. gün gebelik testi","blue","heifers",h.id]);
          if(b.test60Result === "bekliyor") e.push([b.test60Date,h.no,"60. gün gebelik testi","blue","heifers",h.id]);
        }

        if(!b && h.birthDate){
          let target = addMonths(h.birthDate,TARGET_FIRST_CALVING_MONTHS);
          e.push([addDays(target,-GESTATION),h.no,"Tohumlama yaşına yaklaşıyor","orange","heifers",h.id]);
        }

        if(h.dueDate) e.push([h.dueDate,h.no,"Tahmini doğum","orange","heifers",h.id]);
      }

      for(const c of state.calves.filter(x => !x.archived && x.birthDate)){
        e.push([addDays(c.birthDate,90),c.no,"3 ayı doluyor","purple","calves",c.id]);
      }

      return e.filter(x => {
        let d = diff(today(),x[0]);
        return d !== null && d >= 0 && d <= days;
      }).sort((a,b) => a[0].localeCompare(b[0]));
    }

      const item = getSelected();
      let html = "";

      if(state.modal === "addCow"){
        html = formWrap("İnek Ekle",`
          <div class="formrow"><label>İnek No</label><input name="no" inputmode="numeric" required></div>
          ${dateFields("birthDate","Doğum tarihi")}
          <div class="formrow"><label>Kaçıncı doğum</label><input name="lactationCount" inputmode="numeric"></div>
          <div class="formrow"><label>Irk</label><input name="breed"></div>
          <div class="formrow"><label>Günlük süt L</label><input name="milk" inputmode="decimal"></div>
        `,"saveAddCow");
      }

      if(state.modal === "addHeifer" || state.modal === "editHeifer"){
        html = formWrap(state.modal === "addHeifer" ? "Düve Ekle" : "Düve Düzenle",`
          <div class="formrow"><label>Düve No</label><input name="no" value="${esc(item?.no || "")}" required></div>
          ${dateFields("birthDate","Doğum tarihi",item?.birthDate || today())}
          <div class="formrow"><label>Irk</label><input name="breed" value="${esc(item?.breed || "")}"></div>
          <div class="formrow"><label>Not</label><textarea name="note">${esc(item?.note || "")}</textarea></div>
        `,"saveAddHeifer");
      }

      if(state.modal === "addCalf"){
        html = formWrap("Buzağı Ekle",`
          <div class="formrow"><label>Buzağı No</label><input name="no" required></div>
          <div class="formrow"><label>Anne No</label><input name="motherNo"></div>
          ${dateFields("birthDate","Doğum tarihi")}
          <div class="formrow"><label>Cinsiyet</label><select name="sex"><option value="dişi">Dişi</option><option value="erkek">Erkek</option></select></div>
          <div class="formrow"><label>Sağlık</label><select name="health"><option value="iyi">İyi</option><option value="risk">Riskli</option><option value="hasta">Hasta</option></select></div>
          <div class="formrow"><label>Not</label><textarea name="note"></textarea></div>
        `,"saveAddCalf");
      }

      if(state.modal === "addYoung" || state.modal === "editYoung"){
        html = formWrap(state.modal === "addYoung" ? "Dana Ekle" : "Dana Düzenle",`
          <div class="formrow"><label>Dana No</label><input name="no" value="${esc(item?.no || "")}" required></div>
          ${dateFields("birthDate","Doğum tarihi",item?.birthDate || today())}
          <div class="formrow"><label>Not</label><textarea name="note">${esc(item?.note || "")}</textarea></div>
        `,"saveAddYoung");
      }

      if(state.modal === "antibiotic"){
        html = formWrap("Antibiyotik Ekle",`
          <div class="formrow"><label>İlaç adı</label><input name="treatmentName" required></div>
          ${dateFields("treatmentDate","Başlangıç tarihi")}
          <div class="formrow"><label>Arınma günü</label><input name="withdrawalDays" inputmode="numeric" required></div>
          <div class="notice">Süre bitince otomatik normale alınmaz. Sen manuel normale alırsın.</div>
        `,"saveAntibiotic");
      }

      if(state.modal === "breedingCow" || state.modal === "breedingHeifer"){
        html = formWrap("Tohumlama Gir",`
          ${dateFields("date","Tohumlama tarihi")}
          <div class="formrow"><label>Boğa / tohum kodu</label><input name="code"></div>
          <div class="formrow"><label>Sonuç</label>
            <select name="result">
              <option value="bekliyor">Bekliyor</option>
              <option value="tuttu">Tuttu</option>
              <option value="tutmadi">Tutmadı</option>
              <option value="supheli">Şüpheli</option>
            </select>
          </div>
        `,"saveBreeding");
      }

      if(state.modal === "newBirth"){
        html = formWrap("Yeni Doğum",`
          ${dateFields("lastBirth","Doğum tarihi")}
          <div class="formrow"><label>Not</label><textarea name="note"></textarea></div>
        `,"saveNewBirth");
      }

      if(state.modal === "healthCalf"){
        html = formWrap("Buzağı Sağlık Kaydı",`
          ${dateFields("date","Sağlık tarihi")}
          <div class="formrow"><label>Sağlık durumu</label>
            <select name="health">
              <option value="iyi">İyi</option>
              <option value="risk">Riskli</option>
              <option value="hasta">Hasta</option>
            </select>
          </div>
          <div class="formrow"><label>Not</label><textarea name="note"></textarea></div>
          <label><input type="checkbox" name="colostrum"> Ağız sütü tamam</label><br>
          <label><input type="checkbox" name="navel"> Göbek bakımı yapıldı</label><br>
          <label><input type="checkbox" name="suckle"> Emme iyi</label>
        `,"saveCalfHealth");
      }

      if(state.modal === "calfToHeifer"){
        html = formWrap("Düveye Aktar",`
          <div class="notice">Buzağı düveler bölümüne geçer. Doğum tarihi aynen taşınır.</div>
          <div class="formrow"><label>Yeni düve no</label><input name="no" value="${esc(item?.no || "")}" required></div>
        `,"saveCalfToHeifer");
      }

      if(state.modal === "calfToYoung"){
        html = formWrap("Danaya Aktar",`
          <div class="notice">Buzağı danalar bölümüne geçer. Yaş takibi doğum tarihiyle devam eder.</div>
          <div class="formrow"><label>Yeni dana no</label><input name="no" value="${esc(item?.no || "")}" required></div>
        `,"saveCalfToYoung");
      }

      if(state.modal === "heiferToCow"){
        html = formWrap("İnek Kaydına Aktar",`
          <div class="notice">Düve inekler bölümüne geçer. Süt ve sağım alanları açılır.</div>
          <div class="formrow"><label>İnek no</label><input name="no" value="${esc(item?.no || "")}" required></div>
          ${dateFields("lastBirth","Doğum tarihi")}
        `,"saveHeiferToCow");
      }

      return html;
    }

    function render(){
      if(!state.ready){
        A.innerHTML = `
          ${top("Ahır Takip","Bağlanıyor...")}
          <div class="wrap">
            <div class="card big">Firebase canlı bağlantı kuruluyor...</div>
          </div>
        `;
        return;
      }

      if(state.selected){
        const p = state.selected.split("/");
        const col = p[0];
        const id = p[1];

        const arr = {
          cows:state.cows,
          heifers:state.heifers,
          calves:state.calves,
          youngCattle:state.young
        }[col];

        const item = arr?.find(x => x.id === id);

        if(item){
          A.innerHTML = itemPage(col,item);
        }else{
          state.selected = null;
          render();
        }
      }else{
        const map = {
          home:home,
          cows:cowsPage,
          heifers:heifersPage,
          calves:calvesPage,
          young:youngPage,
          milking:milkingPage,
          calendar:calendarPage
        };

        A.innerHTML = (map[state.view] || home)();
      }

      M.innerHTML = state.modal ? modalHtml() : "";
      M.className = state.modal ? "modal show" : "modal";
    }

    window.go = function(v){
      state.view = v;
      state.selected = null;
      state.filter = "all";
      state.search = "";
      render();
    };

    window.openItem = function(col,id){
      state.selected = col + "/" + id;
      render();
    };

    window.getSelected = function(){
      if(!state.selected) return null;

      const p = state.selected.split("/");
      const col = p[0];
      const id = p[1];

      const arr = {
        cows:state.cows,
        heifers:state.heifers,
        calves:state.calves,
        youngCattle:state.young
      }[col];

      return arr.find(x => x.id === id);
    };

    window.setSearch = function(v){ state.search = v; render(); };
    window.setFilter = function(v){ state.filter = v; render(); };
    window.setTabDays = function(v){ state.tabDays = Number(v); render(); };
    window.openModal = function(m){ state.modal = m; render(); };
    window.closeModal = function(){ state.modal = null; render(); };

    window.dateAuto = function(btn,name){
      btn.parentElement.querySelectorAll("button").forEach(b => b.classList.remove("on"));
      btn.classList.add("on");
      btn.closest(".formrow").querySelector(`input[name="${name}"]`).value = today();
    };

    window.dateManual = function(btn,name){
      btn.parentElement.querySelectorAll("button").forEach(b => b.classList.remove("on"));
      btn.classList.add("on");
      btn.closest(".formrow").querySelector(`input[name="${name}"]`).focus();
    };

    function fd(e){ return Object.fromEntries(new FormData(e.target).entries()); }

    window.saveAddCow = async function(e){
      e.preventDefault();
      let d = fd(e);
      await save("cows",d.no,{
        ...defaultCow(d.no),
        birthDate:d.birthDate,
        lactationCount:d.lactationCount,
        breed:d.breed,
        milk:d.milk
      });
    };

    window.saveAddHeifer = async function(e){
      e.preventDefault();
      let d = fd(e);
      let old = getSelected();

      await save("heifers",old?.id || d.no,{
        ...defaultHeifer(d.no),
        ...old,
        no:d.no,
        birthDate:d.birthDate,
        breed:d.breed,
        note:d.note
      });
    };

    window.saveAddCalf = async function(e){
      e.preventDefault();
      let d = fd(e);

      await save("calves",d.no,{
        ...defaultCalf(d.no),
        motherNo:d.motherNo,
        birthDate:d.birthDate,
        sex:d.sex,
        health:d.health,
        note:d.note
      });
    };

    window.saveAddYoung = async function(e){
      e.preventDefault();
      let d = fd(e);
      let old = getSelected();

      await save("youngCattle",old?.id || d.no,{
        ...defaultYoung(d.no),
        ...old,
        no:d.no,
        birthDate:d.birthDate,
        note:d.note
      });
    };

    window.saveAntibiotic = async function(e){
      e.preventDefault();
      let d = fd(e);
      let c = getSelected();

      await save("cows",c.id,{
        status:"antibiyotik",
        treatmentName:d.treatmentName,
        treatmentDate:d.treatmentDate,
        withdrawalDays:d.withdrawalDays,
        milkSafeDate:addDays(d.treatmentDate,Number(d.withdrawalDays))
      });
    };

    window.saveBreeding = async function(e){
      e.preventDefault();
      let d = fd(e);
      let item = getSelected();
      let col = state.selected.split("/")[0];

      let b = {
        id:uid(),
        date:d.date,
        code:d.code,
        result:d.result || "bekliyor",
        test35Date:addDays(d.date,35),
        test35Result:"bekliyor",
        test60Date:addDays(d.date,60),
        test60Result:"bekliyor",
        dueDate:addDays(d.date,GESTATION)
      };

      let patch = {
        breeding:[...(item.breeding || []),b],
        activeBreedingId:b.id,
        status:"tohumlandi",
        dueDate:b.dueDate
      };

      if(col === "cows"){
        patch.dryOffDate = addDays(b.dueDate,-DRY_BEFORE);
      }else{
        patch.prepDate = addDays(b.dueDate,-DRY_BEFORE);
      }

      await save(col,item.id,patch);
    };

    window.saveNewBirth = async function(e){
      e.preventDefault();
      let d = fd(e);
      let c = getSelected();

      await save("cows",c.id,{
        status:"yeni",
        lastBirth:d.lastBirth,
        note:[c.note,d.note].filter(Boolean).join(" | ")
      });
    };

    window.saveCalfHealth = async function(e){
      e.preventDefault();
      let d = fd(e);
      let c = getSelected();

      let rec = {
        date:d.date,
        health:d.health,
        note:d.note
      };

      await save("calves",c.id,{
        health:d.health,
        note:d.note || c.note,
        colostrum:!!d.colostrum || c.colostrum,
        navel:!!d.navel || c.navel,
        suckle:!!d.suckle || c.suckle,
        records:[...(c.records || []),rec]
      });
    };

    window.saveCalfToHeifer = async function(e){
      e.preventDefault();
      let d = fd(e);
      let c = getSelected();

      await save("heifers",d.no,{
        ...defaultHeifer(d.no),
        birthDate:c.birthDate,
        breed:c.breed || "",
        note:"Buzağıdan aktarıldı: " + c.no
      });

      await archive("calves",c);
    };

    window.saveCalfToYoung = async function(e){
      e.preventDefault();
      let d = fd(e);
      let c = getSelected();

      await save("youngCattle",d.no,{
        ...defaultYoung(d.no),
        birthDate:c.birthDate,
        note:"Buzağıdan aktarıldı: " + c.no
      });

      await archive("calves",c);
    };

    window.saveHeiferToCow = async function(e){
      e.preventDefault();
      let d = fd(e);
      let h = getSelected();

      await save("cows",d.no,{
        ...defaultCow(d.no),
        birthDate:h.birthDate,
        breed:h.breed,
        lactationCount:"1",
        status:"yeni",
        lastBirth:d.lastBirth,
        note:"Düveden aktarıldı: " + h.no
      });

      await archive("heifers",h);
    };

    window.archive = archive;
    window.remove = remove;

    init();
  </script>
</body>
</html>
